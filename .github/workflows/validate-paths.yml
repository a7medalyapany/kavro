name: Validate Path Parity

on:
  pull_request:
    branches: [ dev, main ]
  push:
    branches: [ dev, main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up shell
        run: |
          sudo apt-get update -y
          sudo apt-get install -y zip unzip ripgrep
      - name: Run path parity tests
        run: |
          make test
